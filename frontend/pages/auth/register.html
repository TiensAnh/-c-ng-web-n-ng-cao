<!DOCTYPE html><html lang="vi"><head><meta charset="UTF-8"><title>Đăng ký</title>
<link rel="stylesheet" href="../../css/base.css">
<link rel="stylesheet" href="../../css/components.css">
</head><body>
<div class="flex-center" style="min-height:100vh;background:#f0f4ff">
  <div class="card" style="width:440px;padding:40px">
    <h2 style="margin-bottom:24px;color:var(--primary)">Tạo tài khoản</h2>
    <div class="form-group"><label>Họ tên</label><input type="text" id="name" class="form-control" placeholder="Nguyễn Văn A"></div>
    <div class="form-group"><label>Email</label><input type="email" id="email" class="form-control"></div>
    <div class="form-group"><label>Số điện thoại</label><input type="tel" id="phone" class="form-control"></div>
    <div class="form-group"><label>Mật khẩu</label><input type="password" id="password" class="form-control"></div>
    <button class="btn btn-primary" style="width:100%" id="btn-register">Đăng ký</button>
    <p style="text-align:center;margin-top:16px">Đã có tài khoản? <a href="login.html" style="color:var(--primary)">Đăng nhập</a></p>
  </div>
</div>
<script type="module">
  import { api } from '../../js/api.js';
  import { toast } from '../../js/utils.js';
  document.getElementById('btn-register').addEventListener('click', async () => {
    try {
      await api.post('/auth/register', {
        name: document.getElementById('name').value,
        email: document.getElementById('email').value,
        phone: document.getElementById('phone').value,
        password: document.getElementById('password').value,
      });
      toast('Đăng ký thành công! Đang chuyển hướng...');
      setTimeout(() => window.location.href = 'login.html', 1500);
    } catch (e) { toast(e.message, 'error'); }
  });
</script>
</body></html>
