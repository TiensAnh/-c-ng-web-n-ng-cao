<!DOCTYPE html><html lang="vi"><head><meta charset="UTF-8"><title>Đăng nhập</title>
<link rel="stylesheet" href="../../css/base.css">
<link rel="stylesheet" href="../../css/components.css">
</head><body>
<div class="flex-center" style="min-height:100vh;background:#f0f4ff">
  <div class="card" style="width:420px;padding:40px">
    <h2 style="margin-bottom:24px;color:var(--primary)">Đăng nhập</h2>
    <div class="form-group"><label>Email</label><input type="email" id="email" class="form-control" placeholder="your@email.com"></div>
    <div class="form-group"><label>Mật khẩu</label><input type="password" id="password" class="form-control" placeholder="••••••••"></div>
    <button class="btn btn-primary" style="width:100%" id="btn-login">Đăng nhập</button>
    <p style="text-align:center;margin-top:16px">Chưa có tài khoản? <a href="register.html" style="color:var(--primary)">Đăng ký</a></p>
  </div>
</div>
<script type="module">
  import { api } from '../../js/api.js';
  import { saveAuth } from '../../js/auth.js';
  import { toast } from '../../js/utils.js';
  document.getElementById('btn-login').addEventListener('click', async () => {
    try {
      const data = await api.post('/auth/login', {
        email: document.getElementById('email').value,
        password: document.getElementById('password').value,
      });
      saveAuth(data);
      window.location.href = data.user.role === 'admin' ? '../admin/dashboard.html' : '../../index.html';
    } catch (e) { toast(e.message, 'error'); }
  });
</script>
</body></html>
